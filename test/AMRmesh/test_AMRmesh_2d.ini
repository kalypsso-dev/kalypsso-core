[run]
dimension=2
tEnd=0.5
nStepmax=10

# noutput equals -1 means we dump data at every time steps
nOutput=-1

[amr]
level_min=4
level_max=6

use_block_data=yes
bx=4
by=4

# init step may contain calls to globalRefine
# if the following option is true, we interleave
# calls to load balancing in between globalRefine
# if the following option is false, a single load
# balancing operation is done at the end of
# globalRefine steps
enable_load_balance_during_init=false

epsilon_refine=0.01
epsilon_coarsen=0.03

connectivity = disk2d
geometry = disk2d

[mesh]
xmin=0.0
ymin=0.0

scaling_factor=1.0

boundary_type_xmin=WALL
boundary_type_xmax=WALL

boundary_type_ymin=WALL
boundary_type_ymax=WALL

[hydro]
gamma0=1.666
cfl=0.8
niter_riemann=10
slope_type=2
problem=blast
riemann=HLLC

[blast]
density_in=1.0
density_out=1.2
radius=0.25

[output]
outputDir=./
outputPrefix=test_hdf5
outputVtkAscii=false
write_variables=rho,rho_vx
write_mesh_info=yes
vtk_enabled=no
hdf5_enabled=yes

[other]
implementationVersion=0
